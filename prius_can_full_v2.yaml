binary_sensor:
  - { platform: template, name: "Door Driver",    id: door_driver }
  - { platform: template, name: "Door Passenger", id: door_passenger }
  - { platform: template, name: "Door Rear Left",  id: door_rear_left }
  - { platform: template, name: "Door Rear Right", id: door_rear_right }
  - { platform: template, name: "Door Trunk",     id: door_trunk }
  - { platform: template, name: "Cruise Active",  id: cruise_on }
  - { platform: template, name: "Seatbelt Driver Unlatched", id: belt_driver }
  - platform: template
    name: "Water Pump Running"
    id: wp_running
    lambda: 'return prius::get("wpRun") > 0.5f;'

switch:
  - platform: template
    name: "CAN Dump Mode"
    id: dump_mode
    optimistic: true
    restore_mode: ALWAYS_OFF

# ====================== CAN BUS ======================
canbus:
  - platform: esp32_can
    id: can0
    tx_pin: GPIO6
    rx_pin: GPIO5
    can_id: 0x7DF
    bit_rate: 500KBPS
    # RX queue 5 (TWAI default) -> 64. The filter is ACCEPT_ALL (every bus frame
    # arrives), Canbus::loop() fully drains the queue every cycle, so the depth
    # only buffers frames that pile up during main-loop stalls (slow lambda / USB
    # fflush block). 64 ~1 KB RAM, a cheap reserve. (NOTE: the queue does NOT
    # protect against loss during flash/NVS writes -- there the ISR can get
    # suspended; that is covered by minimizing the rare flash writes.)
    rx_queue_len: 64
    on_frame:
      # ---------- passive broadcast frames ----------
      # 0x620 = SEATS_DOORS, byte5 (index 5). Sources of the bit mapping:
      #   - front left/right + trunk: verified from own dump (0x20/0x10/0x02)
      #   - the two rears: commaai/opendbc "toyota_prius_2010_pt.dbc" (Gen3/XW30):
      #       DOOR_OPEN_FL=bit5(0x20) FR=bit4(0x10) RR=bit3(0x08) RL=bit2(0x04)
      #       SEATBELT_DRIVER_UNLATCHED=byte7 bit6(0x40) -- in own log byte7 was
      #       0x40 throughout, which cross-checks the byte/bit numbering.
      #   bit5 (0x20) = front left (driver)
      #   bit4 (0x10) = front right (passenger)
      #   bit3 (0x08) = rear right   bit2 (0x04) = rear left
      #   bit1 (0x02) = trunk
      # CAVEAT: own "door can" log showed 0x0C (0x08|0x04 together) for both rear
      #   events. Per the DBC this means TWO rear doors open at once; but it can NOT
      #   be ruled out that this body-ECU always sends both bits for any rear door
      #   (in which case the two cannot be told apart). FINAL decision: a clean
      #   recording is needed -- all doors closed, ONLY the rear left opening/closing:
      #     0x04 alone -> separable (the code below is correct);
      #     0x0C -> this car combines them, merge the two rears into one signal.
      - can_id: 0x620
        then:
          - lambda: |-
              if (x.size() < 6) return;
              uint8_t m = x[5];
              id(door_driver).publish_state(m & 0x20);
              id(door_passenger).publish_state(m & 0x10);
              // rear left/right separately (opendbc Gen3 DBC); see the CAVEAT above
              // if the clean recording yields 0x0C for a single rear door
              id(door_rear_left).publish_state(m & 0x04);
              id(door_rear_right).publish_state(m & 0x08);
              id(door_trunk).publish_state(m & 0x02);
              // driver seatbelt unlatched: byte7 bit6 (opendbc SEATBELT_DRIVER_UNLATCHED)
              if (x.size() >= 8) id(belt_driver).publish_state(x[7] & 0x40);
      - can_id: 0x5C8   # cruise control main switch
        then:
          - lambda: |-
              if (x.size() >= 3) id(cruise_on).publish_state(x[2] & 0x10);

      # ---------- passive broadcast values (opendbc Gen3 DBC) ----------
      # No request, high rate. The header on_broadcast() writes into prius::V[];
      # if some ID is not on our bus, the value stays null (non-destructive).
      - can_id: 0x1C4   # POWERTRAIN: fast ENGINE_RPM
        then: { lambda: 'prius::on_broadcast(0x1C4, x);' }
      - can_id: 0x0B4   # SPEED: vehicle speed
        then: { lambda: 'prius::on_broadcast(0x0B4, x);' }
      - can_id: 0x127   # GEAR_PACKET: gear position
        then: { lambda: 'prius::on_broadcast(0x127, x);' }
      - can_id: 0x614   # STEERING_LEVERS: index
        then: { lambda: 'prius::on_broadcast(0x614, x);' }
      - can_id: 0x1D3   # PCM_CRUISE_2: set cruise control speed
        then: { lambda: 'prius::on_broadcast(0x1D3, x);' }
      - can_id: 0x5A4   # Gas Gauge: fuel level (passive broadcast)
        then: { lambda: 'prius::on_broadcast(0x5A4, x);' }

      # ---------- ISO-TP diag responses (all four ECUs) ----------
      - can_id: 0x7E8
        then: { lambda: 'uint16_t fc=prius::on_can_frame(0x7E8,x,millis()); if(fc) id(can0).send_data(fc-8,false,{0x30,0x00,0x05,0,0,0,0,0});' }
      - can_id: 0x7EA
        then: { lambda: 'uint16_t fc=prius::on_can_frame(0x7EA,x,millis()); if(fc) id(can0).send_data(fc-8,false,{0x30,0x00,0x05,0,0,0,0,0});' }
      - can_id: 0x7CC
        then: { lambda: 'uint16_t fc=prius::on_can_frame(0x7CC,x,millis()); if(fc) id(can0).send_data(fc-8,false,{0x30,0x00,0x05,0,0,0,0,0});' }
      - can_id: 0x7B8
        then: { lambda: 'uint16_t fc=prius::on_can_frame(0x7B8,x,millis()); if(fc) id(can0).send_data(fc-8,false,{0x30,0x00,0x05,0,0,0,0,0});' }

      # ---------- dump mode (filtered + deduped + non-blocking, in the header) ----------
      - can_id: 0
        can_id_mask: 0
        then:
          - lambda: 'if (id(dump_mode).state) prius::dump_frame((uint16_t)can_id, x.data(), (int)x.size());'

# ====================== POLLING SCHEDULE ======================
interval:
  # Cycling through the diag PIDs - EVENT-DRIVEN. The 20 ms tick is just a fast
  # watchdog: we send a new request ONLY if the previous response has already
  # completed (prius::ready_for_next), OR if no response has come for >60 ms (lost
  # response fallback). This way there is no fixed 80 ms dead time and no multi-frame
  # ISO-TP transfer gets stuck either. The decision whether to send is in the header
  # (ready_for_next/last_req_ms), the actual send_data is here.
  - interval: 20ms
    then:
      - lambda: |-
          uint32_t now = millis();
          if (prius::ready_for_next || (now - prius::last_req_ms) > 60) {
            // static: the capacity is retained between ticks -> assembling the
            // request frame does not reallocate (single-threaded on the main loop, safe)
            static std::vector<uint8_t> req;
            uint16_t rid;
            if (prius::next_request(rid, req, now))
              id(can0).send_data(rid, false, req);
          }

  # Host (head unit) wall-clock time over the serial link: read "T<unix>\n" lines
  # (non-blocking stdin = USB Serial/JTAG). The head unit pushes its time so the
  # ESP can timestamp events (e.g. refuel) without Wi-Fi/NTP.
  - interval: 250ms
    then:
      - lambda: |-
          prius::read_host_serial(millis());
          if (prius::dump_cmd >= 0) {       // app-requested dump on/off -> drive the switch
            if (prius::dump_cmd) { prius::dump_clear(); id(dump_mode).turn_on(); }
            else                   id(dump_mode).turn_off();
            prius::dump_cmd = -1;
          }

  # Calculated fuel consumption + warnings every 500 ms (fuel = computed from maf,
  # so the derived values also keep pace with the fast 7E0/2101 poll)
  - interval: 500ms
    then:
      - lambda: |-
          prius::compute_derived(millis());

  # Save the self-learning baseline into the persistent global every 5 minutes. The
  # actual flash write is independent of this: ESPHome only saves the global ON CHANGE
  # (memcmp), and the flash flush happens every flash_write_interval (default 60s)
  # -> in practice <=1 flash write / 5 minutes, and ONLY while driving (with the car
  # stationary the baseline does not change -> no write). For the slowly changing EWMA,
  # losing 5 minutes (on an unexpected power loss) is negligible.
  - interval: 300s
    then:
      - lambda: |-
          prius::learn_export(id(learn_state).data());
          prius::cap_export(id(cap_state).data());
          if (prius::refuel_dirty) { id(refuel_epoch) = prius::last_refuel_epoch; prius::refuel_dirty = false; }

  # Full JSON state to the serial port every 250 ms (4 Hz; the divider=1
  # PIDs update more frequently than this internally, so every line has fresh rpm/spd)
  - interval: 250ms
    then:
      - lambda: |-
          char extra[64];
          int dm = (id(door_driver).state?0x80:0)|(id(door_passenger).state?0x40:0)
                 |(id(door_rear_left).state?0x08:0)|(id(door_rear_right).state?0x04:0)
                 |(id(door_trunk).state?0x01:0);
          snprintf(extra, sizeof(extra), "\"door\":%d,\"cruise\":%d,\"belt\":%d",
                   dm, id(cruise_on).state?1:0, id(belt_driver).state?1:0);
          prius::emit_json(extra, millis());
