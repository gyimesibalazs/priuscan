# Prius XW30 – FULL CAN/OBD monitor on the ESP32-C6 Super Mini
# ============================================================
# Source: PriusChat "GenIII Prius 4-24-12" Torque CSV (usbseawolf2000),
# every formula and byte offset comes FROM THERE -> verified.
#
# Four diag ECUs, over ISO-TP:
#   7E0  engine ECU     (mode 21 01: basic engine data)
#   7E2  hybrid ECU     (mode 21: MG, inverter, boost, HV battery, water pump)
#   7C4  climate ECU    (mode 21: compressor, temperatures)
#   7B0  ABS/brake ECU  (mode 21: wheels, G-sensors, steering)
# Responses: request+8 (7E8/7EA/7CC/7B8).
#
# Plus passive broadcast frames (door, lamp, cruise control) with no request.
#
# Wiring: OBD 6->CAN-H, 14->CAN-L, 4/5->GND (common!)
# SN65HVD230: VCC->3V3, RS->GND, D->GPIO4, R->GPIO5. Power: head unit USB-C.
# Output: JSON line over native USB (VID 303A PID 1001).

esphome:
  name: prius-can
  friendly_name: Prius CAN
  includes:
    - prius_parse.h
  on_boot:
    priority: -100   # the globals have been restored by then
    then:
      - lambda: 'prius::learn_import(id(learn_state).data()); prius::cap_import(id(cap_state).data()); prius::last_refuel_epoch = id(refuel_epoch);'

# Persistent storage of the self-learning weak-block baseline (lz[14] + sample count).
# restore_value: restored on boot, periodically flushed to flash (the YAML
# also writes out the header state every 60 s so the latest gets saved).
globals:
  - id: learn_state
    type: "std::array<float, 15>"
    restore_value: yes
  - id: cap_state          # self-learned pack capacity: {cap_ah, cap_n, vl_avg}
    type: "std::array<float, 3>"
    restore_value: yes
  - id: refuel_epoch       # unix seconds of the last detected refuel (persisted)
    type: uint32_t
    restore_value: yes

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: WARN
  hardware_uart: USB_SERIAL_JTAG

# Quiet (network-free) operation: no wifi/web_server/OTA. The JSON goes out over
# the serial (USB) port. For G-sensor calibration the wifi AP + web_server can be
# temporarily put back (the raw0..raw7 sensors are already in place).

