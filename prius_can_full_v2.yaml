# Prius XW30 – TELJES CAN/OBD monitor ESP32-C6 Super Mini-n
# ============================================================
# Forras: PriusChat "GenIII Prius 4-24-12" Torque CSV (usbseawolf2000),
# minden keplet es bajt-offset ONNAN szarmazik -> verifikalt.
#
# Negy diag-ECU, ISO-TP-vel:
#   7E0  motor-ECU      (mode 21 01: alap motoradatok)
#   7E2  hibrid-ECU     (mode 21: MG, inverter, boost, HV akku, vizpumpa)
#   7C4  klima-ECU      (mode 21: kompresszor, homersekletek)
#   7B0  ABS/fek-ECU    (mode 21: kerekek, G-szenzorok, kormany)
# Valaszok: keres+8 (7E8/7EA/7CC/7B8).
#
# Plusz passziv broadcast frame-ek (ajto, lampa, tempomat) keres nelkul.
#
# Bekotes: OBD 6->CAN-H, 14->CAN-L, 4/5->GND (kozos!)
# SN65HVD230: VCC->3V3, RS->GND, D->GPIO4, R->GPIO5. Tap: fejegyseg USB-C.
# Kimenet: JSON sor a nativ USB-n (VID 303A PID 1001).

esphome:
  name: prius-can
  friendly_name: Prius CAN
  includes:
    - prius_parse.h

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: WARN
  hardware_uart: USB_SERIAL_JTAG

# --- IDEIGLENES a G-szenzor debughoz: wifi AP + web UI ---
# A web UI-n (http://192.168.4.1) elve latod a szenzorokat.
# Ha kesz a kalibralas, ez a harom blokk torolheto a nyugalmi
# (halozatmentes) uzemhez.
wifi:
  ap:
    ssid: "PriusCAN"
    password: "prius2026"

web_server:
  port: 80
  version: 2

