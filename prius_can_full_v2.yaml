binary_sensor:
  - { platform: template, name: "Door Driver",    id: door_driver }
  - { platform: template, name: "Door Passenger", id: door_passenger }
  - { platform: template, name: "Door Rear Left",  id: door_rear_left }
  - { platform: template, name: "Door Rear Right", id: door_rear_right }
  - { platform: template, name: "Door Trunk",     id: door_trunk }
  - { platform: template, name: "Cruise Active",  id: cruise_on }
  - platform: template
    name: "Water Pump Running"
    id: wp_running
    lambda: 'return prius::V.get("wpRun") > 0.5f;'

switch:
  - platform: template
    name: "CAN Dump Mode"
    id: dump_mode
    optimistic: true
    restore_mode: ALWAYS_OFF

# ====================== CAN BUSZ ======================
canbus:
  - platform: esp32_can
    id: can0
    tx_pin: GPIO6
    rx_pin: GPIO5
    can_id: 0x7DF
    bit_rate: 500KBPS
    on_frame:
      # ---------- passziv broadcast frame-ek ----------
      # 0x620: ajtok allapota (dump-bol verifikalva). byte5 (index 5):
      #   bit5 (0x20) = vezeto, bit4 (0x10) = utas  (ket elso ajto tesztelve)
      #   bit3/2/1 (0x08/0x04/0x02) = hatsok/csomagter - meg ellenorizendo
      # 0x620 byte5 (index 5) - dumpbol verifikalva:
      #   bit5 (0x20) = bal elso (vezeto)
      #   bit4 (0x10) = jobb elso (utas)
      #   bit3 (0x08) = jobb hatso   bit2 (0x04) = bal hatso (tipp)
      #   bit1 (0x02) = csomagter
      - can_id: 0x620
        then:
          - lambda: |-
              if (x.size() < 6) return;
              uint8_t m = x[5];
              id(door_driver).publish_state(m & 0x20);
              id(door_passenger).publish_state(m & 0x10);
              // ket hatso kulon (tipp: bit2 0x04 = bal, bit3 0x08 = jobb;
              // ha forditva van, csak a ket sort/bitet kell cserelni)
              id(door_rear_left).publish_state(m & 0x04);
              id(door_rear_right).publish_state(m & 0x08);
              id(door_trunk).publish_state(m & 0x02);
      - can_id: 0x5C8   # tempomat fokapcsolo
        then:
          - lambda: |-
              if (x.size() >= 3) id(cruise_on).publish_state(x[2] & 0x10);

      # ---------- ISO-TP diag valaszok (mind a negy ECU) ----------
      - can_id: 0x7E8
        then: { lambda: 'uint16_t fc=prius::on_can_frame(0x7E8,x,millis()); if(fc) id(can0).send_data(fc-8,false,{0x30,0x00,0x05,0,0,0,0,0});' }
      - can_id: 0x7EA
        then: { lambda: 'uint16_t fc=prius::on_can_frame(0x7EA,x,millis()); if(fc) id(can0).send_data(fc-8,false,{0x30,0x00,0x05,0,0,0,0,0});' }
      - can_id: 0x7CC
        then: { lambda: 'uint16_t fc=prius::on_can_frame(0x7CC,x,millis()); if(fc) id(can0).send_data(fc-8,false,{0x30,0x00,0x05,0,0,0,0,0});' }
      - can_id: 0x7B8
        then: { lambda: 'uint16_t fc=prius::on_can_frame(0x7B8,x,millis()); if(fc) id(can0).send_data(fc-8,false,{0x30,0x00,0x05,0,0,0,0,0});' }

      # ---------- dump mod ----------
      - can_id: 0
        can_id_mask: 0
        then:
          - lambda: |-
              if (!id(dump_mode).state) return;
              char line[80]; int off = snprintf(line, sizeof(line), "#%03X [%d]", (unsigned)can_id, (int)x.size());
              for (auto b : x) off += snprintf(line+off, sizeof(line)-off, " %02X", b);
              line[off++]='\n'; fwrite(line,1,off,stdout);

# ====================== POLLING ÜTEMEZÉS ======================
interval:
  # Diag PID-ek korbejarasa. Minden tick egy keres; a valasz ISO-TP-vel
  # erkezik. ~80 ms eleg ket keres kozott (egy ISO-TP korut <30 ms).
  - interval: 80ms
    then:
      - lambda: |-
          uint16_t rid; std::vector<uint8_t> req;
          if (prius::next_request(rid, req, millis()))
            id(can0).send_data(rid, false, req);

  # Szamitott fogyasztas + warningok 1 s-onkent
  - interval: 1s
    then:
      - lambda: |-
          prius::compute_derived();

  # Teljes JSON allapot a soros portra 500 ms-onkent
  - interval: 500ms
    then:
      - lambda: |-
          char extra[48];
          int dm = (id(door_driver).state?0x80:0)|(id(door_passenger).state?0x40:0)
                 |(id(door_rear_left).state?0x08:0)|(id(door_rear_right).state?0x04:0)
                 |(id(door_trunk).state?0x01:0);
          snprintf(extra, sizeof(extra), "\"door\":%d,\"cruise\":%d", dm, id(cruise_on).state?1:0);
          prius::emit_json(extra);
