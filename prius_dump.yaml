# Prius CAN — TEMPORARY DUMP CONFIG for finding the door frame
# ============================================================
# This is NOT the full monitor; it only dumps the CAN traffic to the serial
# port, so that while opening/closing a door you can see which bit of which
# frame changes.
#
# Usage:
#   esphome run prius_dump.yaml      (with a USB cable)
#   -> the "#XXX b0 b1 ..." lines stream in the serial monitor
#   -> open/close the doors one by one and watch which frame changes
#
# To reduce noise: we only dump the 0x500-0x5FF range (this is where the
# body/comfort broadcast frames live), and ONLY if the frame contents
# CHANGED compared to the previous one -> this way the relevant frame pops
# up exactly when a door opens, instead of the console being flooded by the
# constant traffic.

esphome:
  name: prius-dump

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

canbus:
  - platform: esp32_can
    id: can0
    tx_pin: GPIO6
    rx_pin: GPIO5
    can_id: 0x7DF
    bit_rate: 500KBPS
    on_frame:
      - can_id: 0
        can_id_mask: 0
        then:
          - lambda: |-
              // only the body range (0x500..0x6FF), with change filtering
              if (can_id < 0x500 || can_id > 0x6FF) return;
              static std::map<uint32_t, std::vector<uint8_t>> last;
              auto it = last.find(can_id);
              if (it != last.end() && it->second == x) return;  // unchanged
              last[can_id] = x;
              char line[80];
              int off = snprintf(line, sizeof(line), "#%03X", (unsigned)can_id);
              for (auto b : x) off += snprintf(line+off, sizeof(line)-off, " %02X", b);
              line[off++] = '\n'; line[off] = 0;
              printf("%s", line);
              fflush(stdout);
